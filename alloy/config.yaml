name: Grafana Alloy
version: "1.0.0"
slug: alloy
description: >-
  Ship Home Assistant OS systemd journal logs to Loki using Grafana Alloy.
  Replacement for the deprecated Promtail add-on.
url: https://github.com/Whizzlefred/haos-alloy
codeowners:
  - "@Whizzlefred"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
journald: true
map:
  - addon_config:rw
ports:
  12345/tcp: 12345
ports_description:
  12345/tcp: "Alloy debug UI"
watchdog: "http://[HOST]:[PORT:12345]/-/ready"
options:
  loki_url: "http://localhost:3100/loki/api/v1/push"
  log_level: info
schema:
  loki_url: url
  log_level: "list(debug|info|warn|error)"
  additional_config: "str?"
stage: experimental
apparmor: false
